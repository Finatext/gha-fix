name: cicd

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  test:
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - shell: bash
        run: go test -v ./...

  lint:
    timeout-minutes: 15
    if: github.event.pull_request.draft == false
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          only-new-issues: true

  pre-build-checks:
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check for go mod tidy diff
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go mod tidy resulted in changes to go.mod and/or go.sum. Please run 'go mod tidy' locally and commit the changes."
            exit 1
          }
      - name: Install mockgen
        shell: bash
        run: go install go.uber.org/mock/mockgen@latest
      - name: Run go generate
        shell: bash
        run: go generate ./...
      - name: Check for go generate diff
        shell: bash
        run: |
          git diff --exit-code || {
            echo "::error::go generate resulted in changes. Please run 'go generate ./...' locally and commit the changes."
            exit 1
          }

  build-and-release:
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - lint
      - pre-build-checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: setup build tools
        shell: bash
        run: |
          go install go.uber.org/mock/mockgen@latest
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
